name: 构建并推送 Docker 镜像

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: 构建和上传任务
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 拉取项目代码 (Checkout repository)
        uses: actions/checkout@v4

      - name: 登录到容器镜像中心 (Log in to the Container registry)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Docker 标签 (Extract Docker tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 当有 tag 时，使用 tag 作为版本标签（去掉 v 前缀可选）
            type=semver,pattern={{version}}
            # 同时保留 latest
            type=raw,value=latest,enable=${{ !startsWith(github.ref, 'refs/tags/') }}

      - name: 构建并推送到 Docker Hub / GHCR (Build and push Docker image)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}